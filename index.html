<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>學生遊戲與實驗平台</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Microsoft JhengHei", sans-serif; }
        body, html { height: 100%; background-color: #f4f7f6; }
        #login-container { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background-color: #e0f7fa; padding: 20px; }
        .login-box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .login-box .logo { max-width: 150px; height: auto; margin-bottom: 15px; }
        .login-box h2 { color: #00796b; margin-bottom: 5px; }
        .login-box .subtitle { color: #555; margin-bottom: 25px; font-size: 1.1em; font-weight: bold; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .input-group select, .input-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #00796b; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background-color: #004d40; }
        #dashboard-container { display: none; height: 100vh; flex-direction: row; }
        #sidebar { width: 250px; background-color: #263238; color: white; display: flex; flex-direction: column; }
        .student-info { padding: 20px; background-color: #1a2327; text-align: center; }
        .menu-list { flex-grow: 1; overflow-y: auto; list-style-type: none; padding-bottom: 20px; }
        .menu-section { padding: 15px 20px 5px 20px; font-size: 0.9em; font-weight: bold; color: #80cbc4; text-transform: uppercase; border-bottom: 1px solid #37474f; margin-top: 10px; }
        .menu-item { padding: 12px 20px 12px 30px; cursor: pointer; transition: 0.2s; font-size: 0.95em; }
        .menu-item:hover, .menu-item.active { background-color: #00796b; border-left: 4px solid #b2dfdb; padding-left: 26px; }
        #content-area { flex-grow: 1; display: flex; flex-direction: column; }
        iframe { width: 100%; height: 100%; border: none; background-color: white; }
        @media (max-width: 768px) {
            #dashboard-container { flex-direction: column; }
            #sidebar { width: 100%; height: auto; flex-direction: column; }
            .menu-list { display: flex; flex-wrap: nowrap; overflow-x: auto; white-space: nowrap; padding-bottom: 0; }
            .menu-section { border-bottom: none; border-right: 1px solid #37474f; padding: 15px; margin-top: 0; }
            .menu-item { border-right: 1px solid #37474f; padding: 15px; }
            .menu-item:hover, .menu-item.active { border-left: none; border-bottom: 4px solid #b2dfdb; padding-left: 15px; }
            #content-area { height: calc(100vh - 120px); }
        }
    </style>
</head>
<body>

    <div id="login-container">
        <div class="login-box">
            <img src="logo.jpg" alt="Logo" class="logo">
            <h2>學生登入</h2>
            <div class="subtitle">暑期STEM學科小遊戲</div>
            <div class="input-group">
                <label for="student-class">班別</label>
                <select id="student-class">
                    <option value="">請選擇班別...</option>
                    <option value="1A">1A</option><option value="2A">2A</option><option value="2B">2B</option>
                    <option value="3A">3A</option><option value="4A">4A</option><option value="5A">5A</option><option value="6A">6A</option>
                </select>
            </div>
            <div class="input-group">
                <label for="student-id">學號</label>
                <input type="number" id="student-id" placeholder="輸入學號 (例如: 12)">
            </div>
            <button onclick="login()">進入平台</button>
        </div>
    </div>

    <div id="dashboard-container">
        <div id="sidebar">
            <div class="student-info">
                <h3 id="display-student-info">學生資料</h3>
                <p id="display-level" style="font-size: 0.9em; color: #80cbc4; margin-top: 5px;"></p>
            </div>
            <ul class="menu-list" id="menu"></ul>
        </div>
        <div id="content-area">
            <iframe id="game-frame" src="about:blank" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" referrerpolicy="strict-origin-when-cross-origin"></iframe>
        </div>
    </div>

    <script>
        const juniorMenu = [
            {
                sectionName: "神奇走馬燈",
                items: [
                    { name: "1. 知識講解", path: "https://www.youtube.com/embed/e7RZTl4iI6o" },
                    { name: "2. 硬件組裝及簡易測試", path: "https://www.youtube.com/embed/ZTWK4cFAgas" },
                    { name: "3. 實驗記錄", path: "record.html" }
                ]
            },
            {
                sectionName: "STEM 小遊戲",
                items: [
                    { name: "太空垃圾", path: "太空垃圾.html" },
                    { name: "回收挑戰", path: "回收挑戰.html" },
                    { name: "太空無重力", path: "太空無重力.html" },
                    { name: "農場", path: "農場.html" },
                    { name: "太空人行李", path: "太空人行李.html" }
                ]
            }
        ];

        const seniorMenu = [
            {
                sectionName: "冰壺發射器",
                items: [
                    { name: "1. 知識講解", path: "https://www.youtube.com/embed/kJ9adbwzGLI" }, 
                    { name: "2. 硬件組裝及簡易測試", path: "https://www.youtube.com/embed/SQaF9UKLIbg" },
                    { name: "3. 實驗記錄", path: "record1.html" }
                ]
            },
            {
                sectionName: "STEM 小遊戲",
                items: [
                    { name: "天韻載荷艙", path: "天韻載荷艙.html" },
                    { name: "無人機送貨", path: "無人機送貨.html" },
                    { name: "建橋", path: "建橋.html" },
                    { name: "城市電子拯救隊", path: "城市電子拯救隊.html" },
                    { name: "磁鐵迷宮", path: "磁鐵迷宮.html" } // 【新增】磁鐵迷宮加入高小選單
                ]
            }
        ];

        function login() {
            const studentClass = document.getElementById('student-class').value;
            const studentId = document.getElementById('student-id').value;

            if (!studentClass || !studentId) {
                alert("請選擇班別並輸入學號！");
                return;
            }

            localStorage.setItem('studentClass', studentClass);
            localStorage.setItem('studentId', studentId);

            const gradeLetter = studentClass.charAt(0); 
            const isJunior = (gradeLetter === '1' || gradeLetter === '2');
            
            const menuData = isJunior ? juniorMenu : seniorMenu;
            const levelText = isJunior ? "低小分頁" : "高小分頁";

            document.getElementById('display-student-info').innerText = `${studentClass} 班 - ${studentId} 號`;
            document.getElementById('display-level').innerText = levelText;

            const menuElement = document.getElementById('menu');
            menuElement.innerHTML = ""; 
            
            let isFirstItem = true;

            menuData.forEach(section => {
                const sectionLi = document.createElement('li');
                sectionLi.className = 'menu-section';
                sectionLi.innerText = section.sectionName;
                menuElement.appendChild(sectionLi);

                section.items.forEach(item => {
                    const itemLi = document.createElement('li');
                    itemLi.className = 'menu-item';
                    itemLi.innerText = item.name;
                    itemLi.onclick = () => loadGame(item.path, itemLi);
                    menuElement.appendChild(itemLi);

                    if (isFirstItem) {
                        loadGame(item.path, itemLi);
                        isFirstItem = false;
                    }
                });
            });

            document.getElementById('login-container').style.display = 'none';
            document.getElementById('dashboard-container').style.display = 'flex';
        }

        function loadGame(path, clickedElement) {
            let finalPath = path;
            
            if (!path.startsWith('http')) {
                const sClass = localStorage.getItem('studentClass') || '';
                const sId = localStorage.getItem('studentId') || '';
                const separator = path.includes('?') ? '&' : '?';
                finalPath = `${path}${separator}class=${sClass}&id=${sId}`;
            }

            document.getElementById('game-frame').src = finalPath;

            const listItems = document.querySelectorAll('.menu-item');
            listItems.forEach(li => li.classList.remove('active'));
            if (clickedElement) {
                clickedElement.classList.add('active');
            }
        }
    </script>
</body>
</html>
