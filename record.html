<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>神奇走馬燈 · 實驗記錄</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { -webkit-tap-highlight-color: transparent; touch-action: manipulation; box-sizing: border-box; }
        body { margin: 0; background-color: #f0f9ff; font-family: 'Comic Sans MS', 'PingFang TC', 'Microsoft JhengHei', sans-serif; color: #1e293b; }
        
        /* 頂部列 */
        #topbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 20;
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 16px; background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px); border-bottom: 2px solid #bae6fd;
        }
        
        /* 主要卡片區 */
        .container { max-width: 600px; margin: 70px auto 40px; padding: 0 16px; }
        .panel {
            background: #ffffff; border: 4px solid #bae6fd; border-radius: 24px;
            padding: 24px; box-shadow: 0 8px 24px rgba(56, 189, 248, 0.15);
        }
        
        h1 { font-size: 1.8rem; font-weight: 900; color: #0369a1; text-align: center; margin-bottom: 8px; }
        .intro { text-align: center; color: #475569; font-size: 1.1rem; font-weight: bold; margin-bottom: 24px; }
        
        /* 題目區塊 */
        .question-box {
            background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 16px;
            padding: 20px; margin-bottom: 20px;
        }
        .q-title { font-size: 1.3rem; font-weight: 900; color: #0f172a; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .q-text { font-size: 1.1rem; font-weight: bold; color: #334155; margin-bottom: 16px; line-height: 1.5; }
        
        /* 選項按鈕設計 */
        .options { display: flex; gap: 12px; flex-wrap: wrap; }
        .option-label {
            flex: 1; min-width: 120px; text-align: center; cursor: pointer;
        }
        .option-label input { display: none; }
        .option-card {
            background: #ffffff; border: 3px solid #cbd5e1; border-radius: 16px;
            padding: 16px 12px; font-size: 1.2rem; font-weight: 900; color: #475569;
            transition: all 0.2s; box-shadow: 0 4px 0 #cbd5e1;
        }
        .option-label input:checked + .option-card {
            background: #eff6ff; border-color: #3b82f6; color: #1d4ed8;
            box-shadow: 0 4px 0 #2563eb; transform: translateY(-2px);
        }
        .option-label:active .option-card { transform: translateY(4px); box-shadow: 0 0 0 transparent; }

        /* 提交按鈕 */
        .submit-btn {
            width: 100%; background: #10b981; color: white; font-size: 1.4rem; font-weight: 900;
            border: none; border-radius: 16px; padding: 18px; margin-top: 10px; cursor: pointer;
            box-shadow: 0 6px 0 #059669; transition: transform 0.1s, box-shadow 0.1s;
        }
        .submit-btn:active { transform: translateY(6px); box-shadow: 0 0 0 #059669; }
        .submit-btn:disabled { background: #9ca3af; box-shadow: 0 6px 0 #6b7280; cursor: not-allowed; }

        /* 彈出視窗 */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); z-index: 100;
            display: none; align-items: center; justify-content: center; padding: 16px;
            backdrop-filter: blur(4px);
        }
        .modal-box {
            background: #fff; border-radius: 24px; padding: 32px; max-width: 360px; width: 100%;
            text-align: center; box-shadow: 0 12px 48px rgba(0,0,0,0.2); border: 4px solid #38bdf8;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .modal-btn {
            width: 100%; background: #3b82f6; color: white; font-weight: 900; border: none;
            border-radius: 16px; padding: 16px; font-size: 1.2rem; cursor: pointer; margin-top: 20px;
            box-shadow: 0 4px 0 #2563eb;
        }
        .modal-btn:active { transform: translateY(4px); box-shadow: 0 0 0 #2563eb; }
    </style>
</head>
<body>

    <div id="topbar">
        <div style="font-weight: 900; color: #0369a1; font-size: 1.2rem;">🔬 STEM 實驗室</div>
        <div id="student-info" style="background: #e0f2fe; padding: 6px 12px; border-radius: 99px; font-weight: bold; color: #0284c7;">
            載入中...
        </div>
    </div>

    <div class="container">
        <div class="panel">
            <h1>📝 實驗假設</h1>
            <p class="intro">在實驗之前，讓我們對每個實驗都作一些假設，猜一猜實驗結果：</p>

            <form id="record-form">
                
                <div class="question-box">
                    <div class="q-title"><span>💡</span> 實驗1：縫隙的秘密</div>
                    <div class="q-text">如果不透過中間的縫隙，你可以看到「動畫」移動嗎？</div>
                    <div class="options">
                        <label class="option-label">
                            <input type="radio" name="q1" value="可以" required>
                            <div class="option-card">可以</div>
                        </label>
                        <label class="option-label">
                            <input type="radio" name="q1" value="不可以" required>
                            <div class="option-card">不可以 ❌</div>
                        </label>
                    </div>
                </div>

                <div class="question-box">
                    <div class="q-title"><span>⚙️</span> 實驗2：轉動速度</div>
                    <div class="q-text">猜一猜，快速，慢速，還是中等速度，「動畫」會看得更順暢？</div>
                    <div class="options">
                        <label class="option-label">
                            <input type="radio" name="q2" value="快速" required>
                            <div class="option-card">快速 🐇</div>
                        </label>
                        <label class="option-label">
                            <input type="radio" name="q2" value="慢速" required>
                            <div class="option-card">慢速 🐢</div>
                        </label>
                        <label class="option-label">
                            <input type="radio" name="q2" value="中等速度" required>
                            <div class="option-card">中等速度 🚶</div>
                        </label>
                    </div>
                </div>

                <div class="question-box">
                    <div class="q-title"><span>🎨</span> 實驗3：混色魔術</div>
                    <div class="q-text">當你轉動多過一隻顏色的走馬燈，你認為會出現新顏色嗎？</div>
                    <div class="options">
                        <label class="option-label">
                            <input type="radio" name="q3" value="會" required>
                            <div class="option-card">會 ✨</div>
                        </label>
                        <label class="option-label">
                            <input type="radio" name="q3" value="不會" required>
                            <div class="option-card">不會</div>
                        </label>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submit-btn">📤 提交記錄</button>
            </form>
        </div>
    </div>

    <div id="success-modal" class="modal-overlay">
        <div class="modal-box">
            <div style="font-size: 4rem; margin-bottom: 10px;">🌟</div>
            <h2 style="font-size: 1.8rem; font-weight: 900; color: #0ea5e9; margin-bottom: 8px;">提交成功！</h2>
            <p style="color: #64748b; font-size: 1.1rem; font-weight: bold;">小科學家，你的假設已經記錄下來了，現在開始動手做實驗吧！</p>
            <button class="modal-btn" onclick="returnToHome()">返回主畫面</button>
        </div>
    </div>

    <script>
        // 1. 取得網址參數 (班別與學號)
        const urlParams = new URLSearchParams(window.location.search);
        const studentClass = urlParams.get('class') || '未設定班別';
        const studentId = urlParams.get('id') || '未設定學號';

        // 顯示學生資料
        document.getElementById('student-info').innerText = `${studentClass} 班 - ${studentId} 號`;

        // Google Sheet Apps Script 網址
        const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwHKY-YDXziCb0eCZtW-GQ9MGUQshKIIJk1qJgX7TPqTL1YwThCrvCld5YNSH9CSwpPew/exec";

        // 2. 處理表單提交
        document.getElementById('record-form').addEventListener('submit', function(e) {
            e.preventDefault(); // 阻止網頁重整
            
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.innerText = "⏳ 傳送中...";

            // 取得所選答案
            const q1 = document.querySelector('input[name="q1"]:checked').value;
            const q2 = document.querySelector('input[name="q2"]:checked').value;
            const q3 = document.querySelector('input[name="q3"]:checked').value;

            // 組合上傳文字 (將三題答案組合成一個字串存入 Score 欄位)
            const answerString = `Q1:${q1} | Q2:${q2} | Q3:${q3}`;

            const data = {
                gameName: '神奇走馬燈-實驗記錄',
                studentClass: studentClass,
                studentId: studentId,
                playDate: new Date().toLocaleDateString('zh-HK'),
                playTime: "完成填寫",
                score: answerString
            };

            // 傳送至 Google Sheet
            fetch(GAS_WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify(data),
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }
            })
            .then(res => res.json())
            .then(res => {
                console.log('上傳成功', res);
                document.getElementById('success-modal').style.display = 'flex';
            })
            .catch(err => {
                console.error('上傳失敗', err);
                alert("傳送失敗，請檢查網絡連線後再試一次！");
                submitBtn.disabled = false;
                submitBtn.innerText = "📤 重新提交";
            });
        });

        // 3. 返回主畫面
        function returnToHome() {
            // 因為這個頁面是嵌在 iframe 裡的，所以我們可以請家長框架回到初始狀態
            // 或者簡單顯示提示即可。這裡我們把視窗關閉，清空表單
            document.getElementById('success-modal').style.display = 'none';
            document.getElementById('record-form').reset();
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = false;
            submitBtn.innerText = "📤 提交記錄";
            
            // 可選：發送訊息給父視窗 (index.html) 進行跳轉處理
            // window.parent.postMessage('record_submitted', '*');
        }
    </script>
</body>
</html>
