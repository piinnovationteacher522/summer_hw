<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>城市電子拯救隊</title>
<style>
  :root{
    --night:#0a1430;          
    --night-2:#0f1d44;
    --panel:#15234d;          
    --panel-2:#1c2c5c;
    --line:#2c3f7a;
    --gold:#ffd24a;           
    --gold-soft:#ffe79a;
    --cyan:#46e0ef;           
    --copper:#e08a3c;         
    --green:#54e08a;          
    --red:#ff5d6c;            
    --ink:#eaf1ff;
    --ink-soft:#9fb2e6;
    --shadow:0 18px 40px rgba(0,0,0,.45);
    --rounded:20px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:"PingFang TC","Microsoft JhengHei","Noto Sans TC",system-ui,-apple-system,"Segoe UI",sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1200px 700px at 80% -10%, #1a2f6b 0%, transparent 60%),
      radial-gradient(900px 600px at 10% 110%, #102050 0%, transparent 55%),
      linear-gradient(180deg,#070f26 0%, #0a1430 55%, #0c1738 100%);
    overflow:hidden;
    user-select:none;
  }
  .app{height:100dvh; display:flex; flex-direction:column;}

  .btn{
    border:none; cursor:pointer; font-family:inherit; font-weight:800;
    color:#102; background:linear-gradient(180deg,var(--gold-soft),var(--gold));
    padding:14px 26px; border-radius:16px; font-size:18px;
    box-shadow:0 6px 0 #c79321, 0 10px 22px rgba(0,0,0,.35);
    transition:transform .06s ease, box-shadow .06s ease;
  }
  .btn:active{transform:translateY(4px); box-shadow:0 2px 0 #c79321, 0 6px 14px rgba(0,0,0,.35);}
  .btn.ghost{
    background:var(--panel-2); color:var(--ink);
    box-shadow:0 6px 0 #0c1739, 0 10px 22px rgba(0,0,0,.35);
  }
  .btn.ghost:active{box-shadow:0 2px 0 #0c1739;}
  .btn.cyan{background:linear-gradient(180deg,#9af3fb,var(--cyan)); box-shadow:0 6px 0 #2196a3,0 10px 22px rgba(0,0,0,.35);}
  .btn.cyan:active{box-shadow:0 2px 0 #2196a3;}
  .btn.small{padding:9px 16px; font-size:15px; border-radius:12px;}
  .btn.clear-big{padding:14px 28px; font-size:17px; border-radius:16px;}
  .btn.danger-glow{
    background:linear-gradient(180deg,#ffb0b6,#ff5d6c) !important; color:#3a000a !important;
    box-shadow:0 6px 0 #b13540, 0 0 26px 4px rgba(255,93,108,.6) !important;
    animation:glowpulse 1s ease-in-out infinite;
  }
  @keyframes glowpulse{
    0%,100%{box-shadow:0 6px 0 #b13540, 0 0 22px 2px rgba(255,93,108,.55);}
    50%{box-shadow:0 6px 0 #b13540, 0 0 40px 12px rgba(255,93,108,.95);}
  }

  .title-screen{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:18px;}
  .title-city{position:absolute; left:0; right:0; bottom:0; height:46%; width:100%;}
  .title-inner{position:relative; z-index:2; text-align:center; margin-top:6vh; max-width:760px;}
  .badge{
    display:inline-flex; align-items:center; gap:8px; font-weight:800; letter-spacing:.18em;
    color:var(--cyan); border:1.5px solid #2a6f86; background:rgba(70,224,239,.08);
    padding:7px 16px; border-radius:999px; font-size:13px;
  }
  .game-title{
    font-size:clamp(38px,9vw,76px); font-weight:900; margin:14px 0 6px; line-height:1.02;
    letter-spacing:.02em;
    background:linear-gradient(180deg,#fff,#ffe79a 55%, #ffbf3b);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 0 40px rgba(255,210,74,.25);
  }
  .game-sub{color:var(--ink-soft); font-size:clamp(15px,3.4vw,20px); margin:0 0 28px; font-weight:600;}
  .mode-row{display:flex; gap:18px; justify-content:center; flex-wrap:wrap; margin-top:8px;}
  .mode-card{
    width:230px; max-width:42vw; background:linear-gradient(180deg,var(--panel-2),var(--panel));
    border:1.5px solid var(--line); border-radius:var(--rounded); padding:22px 18px; cursor:pointer;
    box-shadow:var(--shadow); transition:transform .12s ease, border-color .12s ease;
    text-align:left;
  }
  .mode-card:hover{transform:translateY(-4px); border-color:#3f5bb0;}
  .mode-card .ico{font-size:40px;}
  .mode-card h3{margin:8px 0 4px; font-size:22px;}
  .mode-card p{margin:0; color:var(--ink-soft); font-size:13.5px; line-height:1.5;}

  .game-screen{position:absolute; inset:0; display:none; flex-direction:column;}
  .game-screen.on{display:flex;}
  .topbar{
    display:flex; align-items:center; gap:12px; padding:10px 14px;
    background:linear-gradient(180deg,rgba(21,35,77,.95),rgba(15,29,68,.9));
    border-bottom:1px solid var(--line); backdrop-filter:blur(6px); z-index:5;
  }
  .topbar .t-mid{flex:1; min-width:0;}
  .topbar .t-tag{font-size:12px; color:var(--cyan); font-weight:800; letter-spacing:.12em;}
  .topbar .t-title{font-size:17px; font-weight:800; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .topbar .t-title small{color:var(--ink-soft); font-weight:600; font-size:13px;}

  .stage{flex:1; display:flex; min-height:0;}
  .side{
    width:200px; min-width:200px; background:linear-gradient(180deg,var(--panel),var(--night-2));
    border-right:1px solid var(--line); padding:14px 12px; overflow-y:auto; z-index:4;
  }
  .side h4{margin:2px 0 10px; font-size:13px; letter-spacing:.14em; color:var(--ink-soft);}
  .palette{display:grid; grid-template-columns:1fr 1fr; gap:9px;}
  .tool{
    background:var(--panel-2); border:1.5px solid var(--line); border-radius:14px;
    padding:10px 6px 8px; text-align:center; cursor:pointer; transition:transform .08s, border-color .08s;
  }
  .tool:hover{transform:translateY(-2px); border-color:#3f5bb0;}
  .tool .ti{font-size:26px; line-height:1;}
  .tool .tn{font-size:12.5px; margin-top:5px; font-weight:700;}
  .side .tip{margin-top:14px; font-size:12px; color:var(--ink-soft); line-height:1.55; background:rgba(70,224,239,.06); border:1px solid #28567a; padding:10px; border-radius:12px;}
  .side .goal{font-size:13px; line-height:1.6; color:var(--ink); background:rgba(255,210,74,.08); border:1px solid #6a5a25; padding:12px; border-radius:12px;}
  .side .goal b{color:var(--gold);}

  .board-wrap{flex:1; position:relative; min-width:0; display:flex; flex-direction:column;}
  .board-bg{position:absolute; inset:0; overflow:hidden;}
  .board-city{position:absolute; left:0; right:0; bottom:0; height:42%; width:100%; opacity:.9;}
  .board-grid{position:absolute; inset:0; background-image:radial-gradient(rgba(255,255,255,.05) 1px, transparent 1px); background-size:26px 26px; opacity:.5;}
  svg.board{position:relative; z-index:2; width:100%; height:100%; flex:1; touch-action:none;}

  .statusbar{
    position:absolute; left:50%; top:12px; transform:translateX(-50%); z-index:6;
    display:flex; gap:10px; align-items:center; background:rgba(10,20,48,.7);
    border:1px solid var(--line); border-radius:999px; padding:7px 14px; backdrop-filter:blur(6px);
    font-weight:800; font-size:14px; white-space:nowrap;
  }
  .pill{display:inline-flex; align-items:center; gap:6px; padding:3px 10px; border-radius:999px; font-size:13px;}
  .pill.off{background:#27345e; color:var(--ink-soft);}
  .pill.on{background:rgba(84,224,138,.16); color:var(--green); border:1px solid #2f7a4f;}
  .pill.bad{background:rgba(255,93,108,.16); color:var(--red); border:1px solid #8a3340;}

  .toolbar{
    position:absolute; left:50%; bottom:14px; transform:translateX(-50%); z-index:6;
    display:flex; gap:10px; align-items:center;
  }

  .short-flash{position:absolute; inset:0; z-index:7; pointer-events:none; opacity:0; background:radial-gradient(circle at 50% 50%, rgba(255,93,108,.0) 40%, rgba(255,93,108,.32) 100%);}
  .short-flash.on{animation:flash .7s ease-in-out infinite;}
  @keyframes flash{0%,100%{opacity:.15;}50%{opacity:.6;}}
  .short-banner{
    position:absolute; left:50%; top:10px; transform:translateX(-50%); z-index:8;
    width:min(680px,94%);
    background:linear-gradient(180deg,#ff8088,#ff5d6c); color:#3a000a; font-weight:900;
    padding:9px 20px; border-radius:14px; font-size:18px; box-shadow:0 8px 24px rgba(255,93,108,.4);
    display:none; text-align:center;
  }
  .short-banner small{display:block; font-size:12px; font-weight:700; margin-top:2px; color:#5a0010; line-height:1.4;}
  .short-banner.on{display:block; animation:pop .3s ease;}
  @keyframes pop{from{transform:translateX(-50%) scale(.85);}to{transform:translateX(-50%) scale(1);}}

  .modal-bg{position:absolute; inset:0; z-index:20; background:rgba(5,9,22,.66); display:none; align-items:center; justify-content:center; padding:18px; backdrop-filter:blur(3px);}
  .modal-bg.on{display:flex;}
  .modal{
    width:min(560px,94vw); background:linear-gradient(180deg,var(--panel-2),var(--panel));
    border:1.5px solid var(--line); border-radius:24px; box-shadow:var(--shadow); padding:26px 24px; text-align:center;
    animation:rise .22s ease;
  }
  @keyframes rise{from{transform:translateY(18px); opacity:0;}to{transform:translateY(0); opacity:1;}}
  .modal .m-ico{font-size:52px;}
  .modal h2{margin:8px 0 4px; font-size:26px;}
  .modal .m-tag{color:var(--cyan); font-weight:800; letter-spacing:.16em; font-size:13px;}
  .modal p{color:#dbe5ff; font-size:15.5px; line-height:1.7; text-align:left; margin:14px 4px;}
  .modal p b{color:var(--gold);}
  .modal .m-actions{display:flex; gap:12px; justify-content:center; margin-top:18px; flex-wrap:wrap;}
  .progress-dots{display:flex; gap:7px; justify-content:center; margin:6px 0 2px;}
  .progress-dots i{width:9px; height:9px; border-radius:99px; background:#33457e; display:inline-block;}
  .progress-dots i.done{background:var(--gold);}
  .progress-dots i.now{background:var(--cyan); box-shadow:0 0 0 4px rgba(70,224,239,.18);}

  .stars{font-size:30px; letter-spacing:6px; margin:6px 0;}

  .toast{position:absolute; left:50%; bottom:78px; transform:translateX(-50%) translateY(20px); z-index:15;
    background:#0c1840; border:1px solid var(--line); color:var(--ink); padding:10px 16px; border-radius:12px;
    font-weight:700; font-size:14px; opacity:0; transition:.25s; pointer-events:none;}
  .toast.on{opacity:1; transform:translateX(-50%) translateY(0);}

  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes dashmove{to{stroke-dashoffset:-28;}}
  @keyframes bulbpulse{0%,100%{opacity:.85;}50%{opacity:1;}}
  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;}
  }

  @media (max-width:680px){
    .side{width:138px; min-width:138px; padding:10px 8px;}
    .palette{grid-template-columns:1fr 1fr; gap:7px;}
    .tool .ti{font-size:22px;}
    .tool .tn{font-size:11px;}
    .topbar .t-title{font-size:15px;}
  }
</style>
</head>
<body>
<div class="app" id="app">

  <section class="title-screen" id="titleScreen">
    <svg class="title-city" id="titleCity" viewBox="0 0 1000 360" preserveAspectRatio="xMidYMax slice"></svg>
    <div class="title-inner">
      <span class="badge">⚡ 電學小學堂 · 三至六年級</span>
      <h1 class="game-title">城市電子拯救隊</h1>
      <p class="game-sub">全城停電了！用電池、電線同街燈砌好電路，一盞一盞燈光令城市重新亮起來。</p>
      <div class="mode-row">
        <div class="mode-card" id="goLevel" tabindex="0" role="button">
          <div class="ico">🏙️</div>
          <h3>關卡模式</h3>
          <p>跟住任務學電路：正負極、閉合電路、短路、開關、串聯。完成關卡，逐步點亮全城！</p>
        </div>
        <div class="mode-card" id="goFree" tabindex="0" role="button">
          <div class="ico">🧰</div>
          <h3>自由模式</h3>
          <p>自由拿電池、電線、馬達、街燈。駁啱燈會著、馬達會轉；駁錯就會短路。盡情試！</p>
        </div>
      </div>
    </div>
  </section>

  <section class="game-screen" id="gameScreen">
    <div class="topbar">
      <button class="btn ghost small" id="backBtn">← 返回</button>
      <div class="t-mid">
        <div class="t-tag" id="topTag">關卡模式</div>
        <div class="t-title" id="topTitle">第 1 關</div>
      </div>
      <button class="btn ghost small" id="helpBtn">？說明</button>
    </div>

    <div class="stage">
      <aside class="side" id="sidePanel"></aside>

      <div class="board-wrap">
        <div class="board-bg">
          <div class="board-grid"></div>
          <svg class="board-city" id="boardCity" viewBox="0 0 1000 360" preserveAspectRatio="xMidYMax slice"></svg>
        </div>
        <div class="short-flash" id="shortFlash"></div>
        <div class="statusbar" id="statusBar"></div>
        <svg class="board" id="board" viewBox="0 0 1000 620" preserveAspectRatio="xMidYMid meet"></svg>
        <div class="short-banner" id="shortBanner">⚠ 短路！🔥<small>正負極中間冇經過街燈／裝置，電流過快，電池同電線會發熱，好危險！</small></div>
        <div class="toolbar" id="toolbar"></div>
        <div class="toast" id="toast"></div>
      </div>
    </div>
  </section>

  <div class="modal-bg" id="modalBg">
    <div class="modal" id="modal"></div>
  </div>

</div>

<script>
(()=>{
"use strict";

// 【新增】接收主網頁傳來的學生資料
const urlParams = new URLSearchParams(window.location.search);
const studentClass = urlParams.get('class') || '未設定班別';
const studentId = urlParams.get('id') || '未設定學號';
const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwHKY-YDXziCb0eCZtW-GQ9MGUQshKIIJk1qJgX7TPqTL1YwThCrvCld5YNSH9CSwpPew/exec";

// 【新增】上傳紀錄函數
async function sendDataToSheet(finalScore) {
    const data = {
        gameName: '城市電子拯救隊',
        studentClass: studentClass,
        studentId: studentId,
        playDate: new Date().toLocaleDateString('zh-HK'),
        playTime: '完成',
        score: finalScore
    };
    try {
        await fetch(GAS_WEB_APP_URL, { method: 'POST', body: JSON.stringify(data), headers: { 'Content-Type': 'text/plain;charset=utf-8' }});
    } catch (e) { console.error(e); }
}

const $ = sel => document.querySelector(sel);
const create = (tag,attrs={})=>{const e=document.createElementNS("http://www.w3.org/2000/svg",tag);for(const k in attrs)e.setAttribute(k,attrs[k]);return e;};
const dist=(a,b,c,d)=>Math.hypot(a-c,b-d);
let TOAST_T=null;
function toast(msg){const t=$("#toast"); t.textContent=msg; t.classList.add("on"); clearTimeout(TOAST_T); TOAST_T=setTimeout(()=>t.classList.remove("on"),1700);}

let AC=null;
function ac(){ if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}} return AC; }
function beep(freq=600,dur=.12,type="sine",vol=.18){
  const c=ac(); if(!c)return;
  const o=c.createOscillator(), g=c.createGain();
  o.type=type; o.frequency.value=freq; o.connect(g); g.connect(c.destination);
  g.gain.setValueAtTime(0,c.currentTime);
  g.gain.linearRampToValueAtTime(vol,c.currentTime+.01);
  g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+dur);
  o.start(); o.stop(c.currentTime+dur+.02);
}
const sndConnect=()=>beep(720,.09,"triangle",.16);
const sndOn=()=>{beep(660,.1,"sine",.18);setTimeout(()=>beep(990,.14,"sine",.18),90);};
const sndShort=()=>{beep(150,.18,"sawtooth",.22);setTimeout(()=>beep(110,.22,"sawtooth",.2),120);};
const sndWin=()=>{[523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,.16,"triangle",.2),i*110));};

function buildCity(svg){
  svg.innerHTML="";
  const W=1000,H=360;
  const colors=["#142554","#10204a","#172a5e","#0e1c44"];
  const buildings=[];
  let x=-10;
  while(x<W+40){
    const w=38+Math.round(Math.random()*46);
    const h=90+Math.round(Math.random()*200);
    buildings.push({x,y:H-h,w,h,c:colors[Math.floor(Math.random()*colors.length)]});
    x+=w+6+Math.round(Math.random()*8);
  }
  const winList=[];
  buildings.forEach(b=>{
    const r=create("rect",{x:b.x,y:b.y,width:b.w,height:b.h,rx:3,fill:b.c,stroke:"#0a1838","stroke-width":1});
    svg.appendChild(r);
    const cols=Math.max(2,Math.floor(b.w/14)), rows=Math.max(3,Math.floor(b.h/18));
    const padX=(b.w-(cols*8))/(cols+1), padY=8;
    for(let r2=0;r2<rows;r2++)for(let c2=0;c2<cols;c2++){
      const wx=b.x+padX+(c2*(8+padX));
      const wy=b.y+padY+(r2*16);
      if(wy>b.y+b.h-12)continue;
      const win=create("rect",{x:wx,y:wy,width:7,height:9,rx:1.5,fill:"#0c1a3a"});
      svg.appendChild(win);
      winList.push(win);
    }
  });
  svg.appendChild(create("circle",{cx:880,cy:60,r:30,fill:"#f4f1d8",opacity:.5}));
  for(let i=winList.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[winList[i],winList[j]]=[winList[j],winList[i]];}
  return winList;
}
function lightCity(winList,ratio){
  const n=Math.floor(winList.length*Math.max(0,Math.min(1,ratio)));
  winList.forEach((w,i)=>{
    if(i<n){
      if(!w.dataset.col) w.dataset.col = Math.random()<.78 ? "#ffd24a" : "#9fe7ff";
      w.setAttribute("fill", w.dataset.col);
    }else{
      w.setAttribute("fill","#0c1a3a");
    }
  });
}
const titleWins=buildCity($("#titleCity")); lightCity(titleWins,0.05);
const boardWins=buildCity($("#boardCity")); lightCity(boardWins,0.0);

const TYPES={
  battery:{label:"電池", terminals:c=>[
      {tid:c.id+":0", x:c.x-72, y:c.y, kind:"-"},
      {tid:c.id+":1", x:c.x+72, y:c.y, kind:"+"}]},
  bulb:{label:"街燈", terminals:c=>[
      {tid:c.id+":0", x:c.x-20, y:c.y+36, kind:"+"},
      {tid:c.id+":1", x:c.x+20, y:c.y+36, kind:"-"}]},
  motor:{label:"馬達", terminals:c=>[
      {tid:c.id+":0", x:c.x-22, y:c.y+40, kind:"n"},
      {tid:c.id+":1", x:c.x+22, y:c.y+40, kind:"n"}]},
  switchc:{label:"開關", terminals:c=>[
      {tid:c.id+":0", x:c.x-46, y:c.y+8, kind:"n"},
      {tid:c.id+":1", x:c.x+46, y:c.y+8, kind:"n"}]},
};
function terminalsOf(c){return TYPES[c.type].terminals(c);}
function termPos(state,tid){
  const [cid]=tid.split(":");
  const c=state.comps.find(k=>k.id===cid); if(!c)return null;
  return terminalsOf(c).find(t=>t.tid===tid);
}

function simulate(state, opts={}){
  const forceOpen = opts.forceOpen || new Set();
  const parent={};
  const find=a=>{while(parent[a]!==a){parent[a]=parent[parent[a]];a=parent[a];}return a;};
  const union=(a,b)=>{parent[find(a)]=find(b);};
  state.comps.forEach(c=>terminalsOf(c).forEach(t=>parent[t.tid]=t.tid));
  state.wires.forEach(w=>{ if(parent[w.a]&&parent[w.b]) union(w.a,w.b); });
  state.comps.forEach(c=>{
    if(c.type==="switchc" && c.closed && !forceOpen.has(c.id)){
      const t=terminalsOf(c); union(t[0].tid,t[1].tid);
    }
  });

  const batteries=state.comps.filter(c=>c.type==="battery").map(c=>{
    const t=terminalsOf(c);
    return {id:c.id, nNet:find(t[0].tid), pNet:find(t[1].tid)};
  });
  const shorts=batteries.filter(b=>b.pNet===b.nNet).map(b=>b.id);
  const isShort=shorts.length>0;

  const loads=state.comps.filter(c=>c.type==="bulb"||c.type==="motor").map(c=>{
    const t=terminalsOf(c);
    return {id:c.id, type:c.type, a:find(t[0].tid), b:find(t[1].tid)};
  });

  function reach(startNet, excludeId){
    const seen=new Set([startNet]); const stack=[startNet];
    while(stack.length){
      const cur=stack.pop();
      loads.forEach(l=>{
        if(l.id===excludeId)return;
        let nxt=null;
        if(l.a===cur)nxt=l.b; else if(l.b===cur)nxt=l.a;
        if(nxt!==null && !seen.has(nxt)){seen.add(nxt);stack.push(nxt);}
      });
    }
    return seen;
  }

  const loadOn={};   
  const blown={};    
  loads.forEach(l=>{
    if(isShort){loadOn[l.id]=false; return;}
    const ra=reach(l.a,l.id), rb=reach(l.b,l.id); 
    let on=false, rev=false;
    for(const bt of batteries){
      if(ra.has(bt.pNet)&&rb.has(bt.nNet)){on=true;break;}   
      if(ra.has(bt.nNet)&&rb.has(bt.pNet)){rev=true;}         
    }
    if(l.type==="motor"){
      loadOn[l.id]= on||rev;        
    }else{
      loadOn[l.id]= on;             
      if(!on && rev) blown[l.id]=true;  
    }
  });

  const members={};
  state.comps.forEach(c=>terminalsOf(c).forEach(t=>{
    const r=find(t.tid);
    (members[r]=members[r]||[]).push({cid:c.id,type:c.type,kind:t.kind});
  }));

  const liveWire={};
  if(!isShort){
    const anyOn=Object.values(loadOn).some(v=>v);
    if(anyOn){
      state.wires.forEach(w=>{ liveWire[w.id]=true; });
    }
  }

  return {find, isShort, loadOn, blown, members, liveWire, batteries};
}

function render(){
  const sim=simulate(STATE); CUR_SIM=sim;
  board.innerHTML="";

  $("#shortFlash").classList.toggle("on",sim.isShort);
  $("#shortBanner").classList.toggle("on",sim.isShort);

  const defs=create("defs");
  defs.innerHTML=`
    <linearGradient id="copper" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#b9722f"/><stop offset="1" stop-color="#e8a35a"/>
    </linearGradient>`;
  board.appendChild(defs);

  STATE.wires.forEach(w=>{
    const a=termPos(STATE,w.a), b=termPos(STATE,w.b);
    if(!a||!b)return;
    const live=sim.liveWire[w.id] && !sim.isShort;
    const col=sim.isShort?"#ff5d6c":(live?"#ffd24a":"url(#copper)");
    const hit=create("line",{x1:a.x,y1:a.y,x2:b.x,y2:b.y,stroke:"transparent","stroke-width":22,class:"wire-hit","data-wid":w.id,style:"cursor:pointer"});
    board.appendChild(hit);
    board.appendChild(create("line",{x1:a.x,y1:a.y,x2:b.x,y2:b.y,stroke:"#0a1430","stroke-width":9,"stroke-linecap":"round"}));
    board.appendChild(create("line",{x1:a.x,y1:a.y,x2:b.x,y2:b.y,stroke:col,"stroke-width":5,"stroke-linecap":"round"}));
    if(live){
      board.appendChild(create("line",{x1:a.x,y1:a.y,x2:b.x,y2:b.y,stroke:"#fff7d6","stroke-width":3,"stroke-linecap":"round","stroke-dasharray":"3 11",style:"animation:dashmove .5s linear infinite"}));
    }
  });

  if(PENDING){
    const a=termPos(STATE,PENDING.fromTid);
    if(a) board.appendChild(create("line",{x1:a.x,y1:a.y,x2:PENDING.x,y2:PENDING.y,stroke:"#46e0ef","stroke-width":4,"stroke-linecap":"round","stroke-dasharray":"7 6",opacity:.9}));
  }

  STATE.comps.forEach(c=> board.appendChild(compBody(c,sim)) );

  STATE.comps.forEach(c=> terminalsOf(c).forEach(t=>{
    const col = t.kind==="+"?"#ff8a4a":(t.kind==="-"?"#7aa2ff":"#cfe0ff");
    const g=create("g");
    g.appendChild(create("circle",{cx:t.x,cy:t.y,r:9,fill:"#0a1430",stroke:col,"stroke-width":3}));
    g.appendChild(create("circle",{cx:t.x,cy:t.y,r:4,fill:col}));
    g.appendChild(create("circle",{cx:t.x,cy:t.y,r:16,fill:"transparent",class:"terminal","data-tid":t.tid,style:"cursor:pointer"}));
    if(t.kind!=="n") g.appendChild(create("text",{x:t.x,y:t.y-15,"text-anchor":"middle","font-size":15,"font-weight":900,fill:col})).textContent=t.kind;
    board.appendChild(g);
  }));

  renderStatus(sim);
  updateClearBtn(sim.isShort);

  const nowBlown=new Set(Object.keys(sim.blown||{}));
  for(const id of nowBlown){ if(!lastBlown.has(id)){ toast("⚠ 燈泡正負極駁反咗！著唔到，仲會燒壞！"); beep(200,.18,"sawtooth",.18); break; } }
  lastBlown=nowBlown;

  if(STATE.mode==="level") checkLevel(sim);
}

function toSvg(evt){
  const pt=board.createSVGPoint();
  pt.x=evt.clientX; pt.y=evt.clientY;
  const m=board.getScreenCTM();
  if(!m) return {x:0,y:0};
  const p=pt.matrixTransform(m.inverse());
  return {x:p.x,y:p.y};
}
function nearestTerminal(x,y,exclude){
  let best=null,bd=22;
  STATE.comps.forEach(c=>terminalsOf(c).forEach(t=>{
    if(t.tid===exclude)return;
    const d=dist(x,y,t.x,t.y);
    if(d<bd){bd=d;best=t;}
  }));
  return best;
}
function wireExists(a,b){return STATE.wires.some(w=>(w.a===a&&w.b===b)||(w.a===b&&w.b===a));}
let WID=1;

board.addEventListener("pointerdown",e=>{
  ac();
  const t=e.target;
  const term=t.closest?.(".terminal");
  const del=t.closest?.(".comp-del");
  const sw=t.closest?.(".switch-lever");
  const wireHit=t.closest?.(".wire-hit");
  const body=t.closest?.(".comp-body");

  if(del){
    const cid=del.getAttribute("data-del");
    STATE.comps=STATE.comps.filter(c=>c.id!==cid);
    STATE.wires=STATE.wires.filter(w=>!w.a.startsWith(cid+":")&&!w.b.startsWith(cid+":"));
    STATE.selected=null; render(); beep(300,.08,"square",.12);
    return;
  }
  if(term){
    const tid=term.getAttribute("data-tid");
    const p=toSvg(e);
    PENDING={fromTid:tid, x:p.x, y:p.y};
    board.setPointerCapture(e.pointerId);
    render();
    return;
  }
  if(wireHit){
    DRAG={wid:wireHit.getAttribute("data-wid"), wireTap:true};
    return;
  }
  if(body){
    const cid=body.getAttribute("data-cid");
    const c=STATE.comps.find(k=>k.id===cid);
    const p=toSvg(e);
    DRAG={cid, dx:p.x-c.x, dy:p.y-c.y, moved:false, isSwitch:!!sw, sx:e.clientX, sy:e.clientY};
    board.setPointerCapture(e.pointerId);
    return;
  }
  if(STATE.selected){STATE.selected=null;render();}
});

board.addEventListener("pointermove",e=>{
  if(PENDING){
    const p=toSvg(e); PENDING.x=p.x; PENDING.y=p.y; render(); return;
  }
  if(DRAG && !DRAG.wireTap && DRAG.cid){
    if(Math.hypot(e.clientX-DRAG.sx,e.clientY-DRAG.sy)>6) DRAG.moved=true;
    if(STATE.draggable && DRAG.moved){
      const p=toSvg(e);
      const c=STATE.comps.find(k=>k.id===DRAG.cid);
      c.x=Math.max(90,Math.min(910,p.x-DRAG.dx));
      c.y=Math.max(70,Math.min(560,p.y-DRAG.dy));
      render();
    }
  }
});

board.addEventListener("pointerup",e=>{
  if(PENDING){
    const p=toSvg(e);
    const target=nearestTerminal(p.x,p.y,PENDING.fromTid);
    if(target && target.tid!==PENDING.fromTid && !wireExists(PENDING.fromTid,target.tid)){
      STATE.wires.push({id:"w"+(WID++), a:PENDING.fromTid, b:target.tid});
      sndConnect();
    } else if(target && wireExists(PENDING.fromTid,target.tid)){
      toast("呢條線已經駁咗喇！");
    }
    PENDING=null; render(); return;
  }
  if(DRAG){
    if(DRAG.wireTap){
      STATE.wires=STATE.wires.filter(w=>w.id!==DRAG.wid);
      beep(280,.07,"square",.12); DRAG=null; render(); return;
    }
    const c=STATE.comps.find(k=>k.id===DRAG.cid);
    if(c && !DRAG.moved){
      if(DRAG.isSwitch && c.type==="switchc"){
        c.closed=!c.closed; beep(c.closed?620:360,.09,"square",.14); render();
      }else if(STATE.draggable){
        STATE.selected = STATE.selected===c.id?null:c.id; render();
      }
    }
    DRAG=null;
  }
});
board.addEventListener("pointercancel",()=>{PENDING=null;DRAG=null;render();});

    comps:[{id:"bat",type:"battery",x:190,y:160},{id:"sw",type:"switchc",x:480,y:150,closed:false},
           {id:"b1",type:"bulb",x:720,y:170},{id:"b2",type:"bulb",x:760,y:440}],
    goal:`開關合上、兩盞街燈一齊著、無短路。`,
    check:(s,st)=>{
      const sw=st.comps.find(c=>c.type==="switchc");
      if(!sw||!sw.closed||s.isShort||!s.loadOn["b1"]||!s.loadOn["b2"])return false;
      const s2=simulate(st,{forceOpen:new Set([sw.id])});
      return (!s2.loadOn["b1"]||!s2.loadOn["b2"]); 
    }
  }
];

let curLevel=0;
let levelDone=false;
let cityBase=0; 

function startLevel(i){
  curLevel=i; levelDone=false; lastBlown=new Set();
  const L=LEVELS[i];
  STATE={mode:"level", draggable:false, selected:null,
    comps:JSON.parse(JSON.stringify(L.comps)),
    wires:L.wires?JSON.parse(JSON.stringify(L.wires)):[]};
  WID=1; STATE.wires.forEach(w=>{ if(!w.id)w.id="w"+(WID++); });
  $("#topTag").textContent="關卡模式 · "+L.tag;
  $("#topTitle").textContent=L.title;
  $("#sidePanel").innerHTML=`
    <h4>本關任務</h4>
    <div class="goal">${L.goal||L.intro}</div>
    <div class="tip">💡 玩法：用手指／滑鼠<br>點<b>一個接點</b>，再點<br><b>另一個接點</b>，就可以駁電線。<br><br>街燈有 <b>+</b>／<b>–</b>，要駁啱先會著，駁反會燒壞！<br><br>想拆線？<b>點一下條線</b>就得。</div>`;
  $("#toolbar").innerHTML="";
  const clr=document.createElement("button");
  clr.className="btn ghost clear-big clear-wires-btn";
  clr.dataset.normal="🧹 清除電線";
  clr.textContent="🧹 清除電線";
  clr.onclick=()=>{STATE.wires=[]; render();};
  $("#toolbar").appendChild(clr);

  lightCity(boardWins, cityBase);
  showGame();
  render();
  openModal(levelIntroHTML(i,L), [
    {label:"開始接駁 ⚡", cls:"cyan", act:closeModal}
  ]);
}
function levelIntroHTML(i,L){
  return `<div class="m-tag">第 ${i+1} 關 / 共 ${TOTAL_LEVELS} 關</div>
    <div class="m-ico">${["🔋","🎚️","⚠️","🔗","🌃"][i]}</div>
    <h2>${L.title.split("：")[1]||L.title}</h2>
    ${progressDots(i)}
    <p>${L.intro}</p>`;
}
function progressDots(now){
  let h='<div class="progress-dots">';
  for(let k=0;k<TOTAL_LEVELS;k++){
    h+=`<i class="${k<now?'done':(k===now?'now':'')}"></i>`;
  }
  return h+'</div>';
}

function checkLevel(sim){
  if(levelDone||STATE.mode!=="level")return;
  const L=LEVELS[curLevel];
  let ok=false;
  try{ ok=L.check(sim,STATE);}catch(e){ok=false;}
  if(ok){
    levelDone=true;
    sndWin();
    const target=(curLevel+1)/TOTAL_LEVELS;
    animateCity(cityBase, target);
    cityBase=target;
    setTimeout(()=>levelClear(),650);
  }
}
function animateCity(from,to){
  const steps=18; let k=0;
  const iv=setInterval(()=>{k++; lightCity(boardWins, from+(to-from)*(k/steps)); if(k>=steps)clearInterval(iv);},32);
}
function levelClear(){
  const last=curLevel===TOTAL_LEVELS-1;
  const pct=Math.round((curLevel+1)/TOTAL_LEVELS*100);
  const acts=[];
  if(!last) acts.push({label:"下一關 →",cls:"cyan",act:()=>{closeModal();startLevel(curLevel+1);}});
  else acts.push({label:"🎉 完成全部",cls:"cyan",act:()=>{closeModal();finishAll();}});
  acts.push({label:"再試呢關",cls:"ghost",act:()=>{closeModal();startLevel(curLevel);}});
  openModal(`
    <div class="m-tag">任務完成</div>
    <div class="m-ico">✨</div>
    <h2>做得好！</h2>
    <div class="stars">⭐⭐⭐</div>
    <p style="text-align:center">街燈著喇！城市已經修復 <b>${pct}%</b>。<br>${last?'你成功拯救咗成個城市！':'繼續努力，重光下一區！'}</p>
    ${progressDots(Math.min(curLevel+1,TOTAL_LEVELS-1))}
  `, acts);
}
function finishAll(){
  lightCity(boardWins,1);
  openModal(`
    <div class="m-tag">城市電子拯救隊</div>
    <div class="m-ico">🌆</div>
    <h2>全城重光！</h2>
    <p style="text-align:center" id="upload-status">⏳ 雲端成績儲存中...</p>
    <p style="text-align:center">你學識咗：<br><b>正負極 · 閉合電路 · 短路 · 開關 · 串聯電路</b><br><br>多謝你，拯救隊隊長！🎖️</p>
  `,[
    {label:"再玩一次",cls:"cyan",act:()=>{closeModal();cityBase=0;startLevel(0);}},
    {label:"轉自由模式",cls:"ghost",act:()=>{closeModal();startFree();}},
    {label:"返回主頁",cls:"ghost",act:()=>{closeModal();showTitle();}}
  ]);

  // 【新增】上傳紀錄
  sendDataToSheet(100).then(() => {
      const statusEl = document.getElementById('upload-status');
      if(statusEl) statusEl.innerHTML = "✅ 成績已上傳！";
  });
}

let FID=1;
function startFree(){
  STATE={mode:"free", draggable:true, selected:null, comps:[], wires:[]};
  $("#topTag").textContent="自由模式";
  $("#topTitle").textContent="電路實驗室 · 自由砌電路";
  $("#sidePanel").innerHTML=`
    <h4>提取物品</h4>
    <div class="palette">
      <div class="tool" data-add="battery"><div class="ti">🔋</div><div class="tn">電池</div></div>
      <div class="tool" data-add="wire"><div class="ti">➰</div><div class="tn">電線</div></div>
      <div class="tool" data-add="bulb"><div class="ti">💡</div><div class="tn">街燈</div></div>
      <div class="tool" data-add="motor"><div class="ti">⚙️</div><div class="tn">馬達</div></div>
      <div class="tool" data-add="switchc"><div class="ti">🎚️</div><div class="tn">開關</div></div>
    </div>
    <div class="tip">
      ✦ 拖動元件可移動位置<br>
      ✦ 點<b>接點→接點</b>駁電線<br>
      ✦ 點一下電線可拆線<br>
      ✦ 點一下元件可選取／刪除<br>
      ✦ 街燈有 <b>+／–</b>，駁啱先會著；<b>駁反會燒壞</b>💥<br>
      ✦ 正負極中間冇經過街燈／馬達就直接相連 → <b>短路發熱！</b>🔥
    </div>`;
  $("#sidePanel").querySelectorAll(".tool").forEach(el=>{
    el.onclick=()=>addComp(el.getAttribute("data-add"));
  });
  $("#toolbar").innerHTML="";
  const clrW=document.createElement("button");
  clrW.className="btn ghost clear-big clear-wires-btn"; clrW.dataset.normal="🧹 清除電線"; clrW.textContent="🧹 清除電線";
  clrW.onclick=()=>{STATE.wires=[];render();};
  const clrA=document.createElement("button"); clrA.className="btn ghost small"; clrA.textContent="🗑️ 清除全部";
  clrA.onclick=()=>{STATE.comps=[];STATE.wires=[];STATE.selected=null;render();};
  $("#toolbar").appendChild(clrW); $("#toolbar").appendChild(clrA);

  lightCity(boardWins,0.12);
  showGame(); render();
  if(STATE.comps.length===0){
    openModal(`
      <div class="m-tag">自由模式</div>
      <div class="m-ico">🧰</div>
      <h2>電路實驗室</h2>
      <p>喺左邊揀電池、街燈、馬達、開關放落實驗台，再用電線駁起佢哋。<br><br>
      <b>記住：</b>電流要由電池正極（+）出發，經過街燈或馬達，再返回負極（–）。<br>
      如果 + 同 – 直接相連 → 就會<b>短路</b>！</p>`,
      [{label:"開始實驗 🔬",cls:"cyan",act:closeModal}]);
  }
}
const ADD_DEFAULT={battery:{x:280,y:160},bulb:{x:640,y:200},motor:{x:640,y:380},switchc:{x:440,y:300}};
let addOffset=0;
function addComp(type){
  if(type==="wire"){toast("用手指／滑鼠點兩個接點，就可以駁電線！");return;}
  const base=ADD_DEFAULT[type];
  const o=(addOffset++%5)*24;
  const c={id:type[0]+(FID++), type:type, x:Math.min(900,base.x+o), y:Math.min(540,base.y+o)};
  if(type==="switchc")c.closed=false;
  STATE.comps.push(c); render();
  beep(520,.07,"triangle",.12);
}

function showTitle(){$("#gameScreen").classList.remove("on"); $("#titleScreen").style.display="flex"; closeModal();}
function showGame(){$("#titleScreen").style.display="none"; $("#gameScreen").classList.add("on");}

function openModal(html, actions){
  const m=$("#modal");
  m.innerHTML=html;
  const row=document.createElement("div"); row.className="m-actions";
  (actions||[]).forEach(a=>{
    const b=document.createElement("button");
    b.className="btn "+(a.cls||"");
    b.textContent=a.label; b.onclick=a.act;
    row.appendChild(b);
  });
  m.appendChild(row);
  $("#modalBg").classList.add("on");
}
function closeModal(){$("#modalBg").classList.remove("on");}

$("#goLevel").onclick=()=>{ac();cityBase=0;startLevel(0);};
$("#goFree").onclick=()=>{ac();startFree();};
$("#goLevel").addEventListener("keydown",e=>{if(e.key==="Enter"){cityBase=0;startLevel(0);}});
$("#goFree").addEventListener("keydown",e=>{if(e.key==="Enter")startFree();});
$("#backBtn").onclick=()=>showTitle();
$("#helpBtn").onclick=()=>{
  if(STATE.mode==="level"){
    const L=LEVELS[curLevel];
    openModal(levelIntroHTML(curLevel,L),[{label:"知道喇",cls:"cyan",act:closeModal}]);
  }else{
    openModal(`<div class="m-tag">玩法說明</div><div class="m-ico">📘</div><h2>點樣砌電路</h2>
      <p>1. 左邊揀元件放落台。<br>2. 點<b>接點 → 接點</b>駁電線。<br>3. 駁成完整嘅圈：<b>燈會著、馬達會轉</b>。<br>4. 如果把 <b>+ 同 –</b> 直接駁埋（中間冇燈／馬達）就會<b>短路</b>！<br>5. 點電線＝拆線；點元件＝選取後可刪除。</p>`,
      [{label:"知道喇",cls:"cyan",act:closeModal}]);
  }
};
$("#modalBg").addEventListener("pointerdown",e=>{ if(e.target===$("#modalBg")) {} });

showTitle();
})();
</script>
</body>
</html>
